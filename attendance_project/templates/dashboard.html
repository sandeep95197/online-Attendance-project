<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url(/static/dark.jpg);
        }
        .box {
            width: 400px;
            padding: 20px;
            border: 2px solid black;
            margin: auto;
            border-radius: 2px;
            background-color:white;
            margin-top: 50px;
            text-align: center;
        }
        a {
            display: block;
            margin: 10px;
            padding: 8px;
            background: #007bff;
            color: white;
            text-decoration: none;
        }
        a:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

<div class="box">
    <h2 style="font: size 1.2em; ;">Welcome {{ username }}</h2>
    <h3>Role: {{ role }}</h3>

    {% if role == "teacher" %}
    <p>Teacher Dashboard</p>
    <a href="/mark_attendance">Mark Attendance</a>
    <a href="/view_attendance">View All Attendance</a>
    {% elif role == "student" %}
    <p>Student Dashboard</p>
    <a href="/mark_attendance">Mark Attendance</a>
    <a href="/my_attendance">View My Attendance</a>
    {% endif %}

    <a href="/logout">Logout</a>
</div>

</body>
</html>
