<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<style>
    body{
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 70px;
        height: 400px;
        border: 2px solid white;
       
        /* backdrop-filter: blur(10px); */
        width: 500px;
        font-size: 25px;
        padding: 15px;
        background-image: url(/static/online.jpg);
        margin-left: 44%;
        background-size: cover;
        background-repeat: no-repeat;

    }

    input{
        padding: 10px;
        font-size: 25px;
        border-radius: 5px;
    }
</style>
   
    
<body>

<h2 style="color: azure;">Online Attendance Login</h2>

{% if error %}
    <p style="color: red; font-size: 20px;">{{ error }}</p>
{% endif %}

<form method="POST">
    <input type="text" name="username" placeholder="Username" required><br><br>
    <input type="password" name="password" placeholder="Password" required><br><br>

    <button type="submit" style="font-size: 25px;">Login</button>
</form>


</body>
</html>
