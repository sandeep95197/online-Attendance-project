<!DOCTYPE html>
<html>
<head>
    <title>My Attendance</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { width: 800px; margin: auto; padding: 20px; border: 1px solid #ccc; margin-top: 50px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
<div class="container">
    <h2>My Attendance Records</h2>
    <table>
        <tr>
            <th>Date</th>
            <th>Time</th>
            <th>Status</th>
            <th>Delete</th>
        </tr>
        {% for record in records %}
        <tr>
            <td>{{ record[1] }}</td>
            <td>{{ record[2] }}</td>
            <td>{{ record[3] }}</td>
            <td>
                <form action="/delete_attendance" method="POST" style="display: inline;">
                    <input type="hidden" name="id" value="{{ record[0] }}">
                    <button type="submit" style="background-color: green; color: white; border: none; padding: 5px 10px; cursor: pointer;">Delete</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>
    <br>
    <a href="/dashboard">Back to Dashboard</a>
</div>
</body>
</html>
